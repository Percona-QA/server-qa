name: LINT

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Python files
        id: py-changes
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git rev-parse --verify "${BASE_SHA}^{commit}"
          git rev-parse --verify "${HEAD_SHA}^{commit}"

          mapfile -t CHANGED < <(
            git diff --diff-filter=ACMRTUXB --name-only "${BASE_SHA}...${HEAD_SHA}" -- '*.py'
          )

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changed Python files."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed Python files:"
            printf '  %s\n' "${CHANGED[@]}"
          fi

      - uses: reviewdog/action-setup@v1
        if: github.event_name == 'pull_request' && steps.py-changes.outputs.changed == 'true'

      - name: Install ruff
        if: github.event_name != 'pull_request' || steps.py-changes.outputs.changed == 'true'
        run: pip install ruff

      - name: Ruff on changed lines (PR)
        if: github.event_name == 'pull_request' && steps.py-changes.outputs.changed == 'true'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          { ruff check --output-format=rdjson . || true; } \
            | reviewdog \
                -f=rdjson \
                -reporter=github-check \
                -filter-mode=added \
                -fail-on-error=true \
                -level=error

      - name: Run ruff on all Python files
        if: github.event_name != 'pull_request'
        run: ruff check .

  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed shell files
        id: shell-changes
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git rev-parse --verify "${BASE_SHA}^{commit}"
          git rev-parse --verify "${HEAD_SHA}^{commit}"

          mapfile -t CHANGED < <(
            git diff --diff-filter=ACMRTUXB --name-only "${BASE_SHA}...${HEAD_SHA}" -- \
              '*.sh' \
              '*.bash' \
              '*.bats'
          )

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changed shell files."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed shell files:"
            printf '  %s\n' "${CHANGED[@]}"
          fi

      - name: Differential ShellCheck
        if: github.event_name == 'pull_request' && steps.shell-changes.outputs.changed == 'true'
        uses: redhat-plumbers-in-action/differential-shellcheck@v5
        with:
          severity: error
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ShellCheck
        if: github.event_name != 'pull_request'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell files
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          mapfile -t FILES < <(
            find . -type f \( -name '*.sh' -o -name '*.bash' -o -name '*.bats' \)
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No shell files found."
            exit 0
          fi

          echo "Linting shell files (errors only):"
          printf '%s\n' "${FILES[@]}"

          shellcheck -S error "${FILES[@]}"
