name: LINT

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "**.sh"
      - "**.bash"
      - "**.bats"
      - ".github/workflows/**"

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install ruff uv

      - name: Get changed Python files
        id: changed-python
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FILES="$(git diff --diff-filter=ACMRTUXB --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.py' | tr '\n' ' ' || true)"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run ruff on changed Python files
        if: github.event_name == 'pull_request'
        run: |
          FILES="${{ steps.changed-python.outputs.files }}"

          if [ -z "$FILES" ]; then
            echo "No changed Python files."
            exit 0
          fi

          echo "Linting Python files:"
          echo "$FILES"

          uv run ruff check $FILES

      - name: Run ruff on all Python files
        if: github.event_name != 'pull_request'
        run: |
          uv run ruff check .

  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Get changed shell files
        id: changed-shell
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          FILES="$(
            git diff --diff-filter=ACMRTUXB --name-only "$BASE_SHA" "$HEAD_SHA" -- \
              '*.sh' \
              '*.bash' \
              '*.bats' \
            | tr '\n' ' ' || true
          )"

          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run ShellCheck on changed shell files
        if: github.event_name == 'pull_request'
        run: |
          FILES="${{ steps.changed-shell.outputs.files }}"

          if [ -z "$FILES" ]; then
            echo "No changed shell files."
            exit 0
          fi

          echo "Linting shell files:"
          echo "$FILES"

          shellcheck $FILES

      - name: Run ShellCheck on all shell files
        if: github.event_name != 'pull_request'
        run: |
          FILES="$(find . -type f \( -name '*.sh' -o -name '*.bash' -o -name '*.bats' \) | tr '\n' ' ')"

          if [ -z "$FILES" ]; then
            echo "No shell files found."
            exit 0
          fi

          echo "Linting shell files:"
          echo "$FILES"

          shellcheck $FILES
